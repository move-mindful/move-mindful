<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hello World</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #f7f3ea;
        color: #1d2527;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 32px;
        background:
          radial-gradient(circle at 20% 20%, rgba(77, 121, 255, 0.16), transparent 30%),
          linear-gradient(135deg, #f7f3ea 0%, #eff8f6 55%, #f8f1f5 100%);
      }

      main {
        width: min(720px, 100%);
        border: 1px solid rgba(29, 37, 39, 0.14);
        border-radius: 8px;
        padding: clamp(32px, 8vw, 72px);
        background: rgba(255, 255, 255, 0.72);
        box-shadow: 0 24px 70px rgba(29, 37, 39, 0.12);
        backdrop-filter: blur(16px);
      }

      p {
        margin: 0;
        color: #526063;
        font-size: clamp(1rem, 2vw, 1.15rem);
        line-height: 1.6;
      }

      h1 {
        margin: 0 0 16px;
        font-size: clamp(3rem, 10vw, 6.5rem);
        line-height: 0.95;
        letter-spacing: 0;
      }

      .eyebrow {
        margin-bottom: 20px;
        color: #166b60;
        font-size: 0.86rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          background: #121818;
          color: #edf5f3;
        }

        body {
          background:
            radial-gradient(circle at 20% 20%, rgba(107, 144, 255, 0.2), transparent 30%),
            linear-gradient(135deg, #121818 0%, #182927 55%, #241d25 100%);
        }

        main {
          border-color: rgba(237, 245, 243, 0.15);
          background: rgba(18, 24, 24, 0.72);
          box-shadow: 0 24px 70px rgba(0, 0, 0, 0.28);
        }

        p {
          color: #bac8c6;
        }

        .eyebrow {
          color: #7bd8c9;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Codex browser demo</p>
      <h1>Hello, world!</h1>
      <p>
        This page is being served locally from the WeightsApp workspace at
        <strong>localhost:9010</strong>.
      </p>
    </main>
  </body>
</html>
